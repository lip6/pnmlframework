name: Java CI with Maven

on: 
 push:
   branches: [ master ]
 repository_dispatch:
   types: [rebuild]

jobs:
  build:
    name: Maven
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: 'temurin'
    - name: Setup Maven
      uses: stCarolas/setup-maven@v5
      with:
        maven-version: 3.9.9
    - name: Build with Maven
      run: cd pnmlFw-Releng ; mvn generate-sources install -Pall ; cd -
    - name: Build pnmlvalidation and publish fat jar in website
      run: |
        cd pnmlvalidation-Releng
        bash scripts/sync-fatjar-p2-versions.sh
        mvn -DskipTests package
        cd ..
        mkdir -p PnmlFramework_UpdateSite/target/repository/pnmlvalidation
        cp pnmlvalidation-fatjar/target/fr.lip6.pnml.check-fat-*.jar \
          PnmlFramework_UpdateSite/target/repository/pnmlvalidation/fr.lip6.pnml.check-fat.jar
    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4.4.3
      with:
          branch: gh-pages # The branch the action should deploy to.
          folder: PnmlFramework_UpdateSite/target/repository # The folder the action should deploy.
          clean: true # Automatically remove deleted files from the deploy branch
          single-commit: true 
